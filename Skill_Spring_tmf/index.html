<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Acme&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <title>SkillSpring Splash Screen</title>
  </head>
  <body>
    <section class="main-page">
      <h1>SkillSpring</h1>
    </section>
    <div class="loading-container">
      <div class="loading-spinner"></div>
      <p class="loading-text">Loading...</p>
    </div>
    <section class="slide-pg-1 one">
      <div class="skip">
        <p>Skip</p>
      </div>
      <div class="container">
        <img src="img 1.png" alt="" />
        <div class="final-container">
          <h3>Discovery</h3>
          <p>Learn new skills with smarter study tools</p>
          <div class="slider-button">
            <div class="dots">
              <span class="dot active"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
            <button id="next">NEXT</button>
          </div>
        </div>
      </div>
    </section>
    <section class="slide-pg-1 two">
      <div class="skip">
        <p>Skip</p>
      </div>
      <div class="container ooo">
        <img src="img 2.png" alt="" />
        <div class="final-container oo">
          <h3>Personalization</h3>
          <p>Track progress, build habits, and keep momentum</p>
          <div class="slider-button">
            <div class="dots">
              <span class="dot active"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
            <button id="next">NEXT</button>
          </div>
        </div>
      </div>
    </section>
    <section class="slide-pg-1 three">
      <div class="container">
        <img src="img 3.png" alt="" />
        <div class="final-container">
          <h3>Action</h3>
          <p>
            Grow at your own pace with personalized learning around your own
            schedule.
          </p>
          <div class="slider-button">
            <div class="dots">
              <span class="dot active"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
            <button onclick="location.href='signin-signup.html'" id="next">GET STARTED</button>
          </div>
        </div>
      </div>
    </section>
    <script src="Script.js"></script>
  </body>
</html>
